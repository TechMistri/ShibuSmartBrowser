name: Android CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  call-build:
    uses: ./.github/workflows/android-build-reusable.yml
    with:
      branch: ${{ github.ref_name }}
    outputs:
      apk: ${{ steps.apk_path.outputs.apk_url }}

  notify:
    needs: call-build
    runs-on: ubuntu-latest
    steps:
      - name: Post GitHub comment with APK link
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          message: "🎉 APK is ready! Download here: ${{ needs.call-build.outputs.apk }}"
